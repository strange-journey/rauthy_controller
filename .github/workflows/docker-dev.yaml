name: Build and push dev Docker image

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  docker:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout triggering commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl/native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build static release
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
        run: cargo build --release --locked --target x86_64-unknown-linux-musl --bin controller

      - name: Prepare Docker artifact
        run: cp target/x86_64-unknown-linux-musl/release/controller ./controller

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/strange-journey/rauthy-controller
          tags: |
            type=sha,prefix=sha-,format=short

      - name: Build and push dev image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}