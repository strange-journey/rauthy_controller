apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
  name: oidcclients.rauthy.io
spec:
  group: rauthy.io
  names:
    categories: []
    kind: OIDCClient
    plural: oidcclients
    shortNames: []
    singular: oidcclient
  scope: Namespaced
  versions:
  - additionalPrinterColumns: []
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for OIDCClientSpec via `CustomResource`
        properties:
          spec:
            properties:
              access_token_alg:
                default: EdDSA
                description: Algorithm used to sign access tokens (`RS256`, `RS384`, `RS512`, `EdDSA`).
                type: string
              access_token_lifetime:
                default: 1800
                description: Access token lifetime in seconds (10–86400).
                format: int32
                type: integer
              allowed_origins:
                description: Allowed CORS origins (e.g. `["https://app.example.com"]`).
                items:
                  type: string
                nullable: true
                type: array
              auth_code_lifetime:
                default: 60
                description: Authorization code lifetime in seconds (10–300).
                format: int32
                type: integer
              backchannel_logout_uri:
                description: OIDC backchannel logout URI.
                nullable: true
                type: string
              challenges:
                description: Allowed PKCE challenge methods (e.g. `["S256"]`).
                items:
                  type: string
                nullable: true
                type: array
              client_id:
                description: The Rauthy client ID. Changing this after creation will create a new client.
                type: string
              client_uri:
                description: URI of the client application (shown in the consent screen).
                nullable: true
                type: string
              confidential:
                description: Whether this is a confidential client (secret required).
                type: boolean
              contacts:
                description: Contact e-mail addresses for this client.
                items:
                  type: string
                nullable: true
                type: array
              default_scopes:
                default:
                - openid
                description: Scopes included in every token without explicit request.
                items:
                  type: string
                type: array
              enabled:
                default: true
                description: Whether this client is currently enabled.
                type: boolean
              flows_enabled:
                default:
                - authorization_code
                - refresh_token
                description: |-
                  Enabled OAuth2/OIDC grant flows.
                  Valid values: `authorization_code`, `client_credentials`, `refresh_token`,
                  `urn:ietf:params:oauth:grant-type:device_code`.
                items:
                  type: string
                type: array
              force_mfa:
                default: false
                description: Require MFA for all logins via this client.
                type: boolean
              id_token_alg:
                default: EdDSA
                description: Algorithm used to sign ID tokens (`RS256`, `RS384`, `RS512`, `EdDSA`).
                type: string
              logo:
                description: |-
                  An optional base64-encoded logo for the client, set in a base64data field with a mediatype.
                  The image is downscaled in Rauthy to a resolution no greater than 128x128px.
                nullable: true
                properties:
                  base64data:
                    description: Base64-encoded image byte data.
                    type: string
                  mediatype:
                    description: |-
                      MIME type for the image.
                      Rauthy supports `image/svg+xml`, `image/png`, and `image/jpeg`.
                    type: string
                required:
                - base64data
                - mediatype
                type: object
              name:
                description: Human-readable display name for the client.
                nullable: true
                type: string
              post_logout_redirect_uris:
                description: Allowed post-logout redirect URIs.
                items:
                  type: string
                nullable: true
                type: array
              redirect_uris:
                description: Allowed redirect URIs.
                items:
                  type: string
                type: array
              restrict_group_prefix:
                description: Restrict logins to users whose primary group starts with this prefix.
                nullable: true
                type: string
              scopes:
                default:
                - email
                - openid
                - profile
                - groups
                description: Scopes this client is allowed to request.
                items:
                  type: string
                type: array
              secret_cache_current_hours:
                description: |-
                  Number of hours for which the existing client secret should be cached by the controller.
                  This optionally allows graceful secret rotation and keeps the current Rauthy secret cached in-memory.
                  A value of 1-24 hours is allowed here.
                format: uint32
                minimum: 0.0
                nullable: true
                type: integer
              secret_name:
                description: |-
                  If `confidential` is true, the controller will create and maintain a
                  Kubernetes Secret with this name in the same namespace.
                  Defaults to `{client_id}-oidc-secret` when not set.
                  The Secret will contain `client_id` and `client_secret` keys.
                nullable: true
                type: string
            required:
            - client_id
            - confidential
            - redirect_uris
            type: object
          status:
            nullable: true
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      type: string
                    observedGeneration:
                      default: 0
                      format: int64
                      type: integer
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              secret_name:
                nullable: true
                type: string
            type: object
        required:
        - spec
        title: OIDCClient
        type: object
    served: true
    storage: true
    subresources:
      status: {}
